protoc_path: "../../bin/protoc"
protoc_plugin_path: "../../bin/plugin/protoc-gen-template"
src_base_path: "./proto/"
template_base_path: "template/"
out_base_path: "./output/"
items:
  - name: "generate_ruby"
    src_path_pattern: "./**/*.proto"
    items:
      - message: "Generating Ruby classes..."
        template_path: "ruby_class.sbncs"
        file_suffix: ".rb"
        out_dir_path: ""
        out_file_case: "snake"
